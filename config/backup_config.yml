# 备份配置示例
global:
  # 压缩级别 (1-9)
  compression_level: 9
  # 是否使用并行处理
  parallel: true
  # 是否验证备份
  verify: true

databases:
  # ChromaDB数据库备份
  - name: chromadb_main
    type: chromadb
    # 数据库路径
    path: C:\Users\Administrator\Documents\trae_projects\635416546534\Graph-Vector-Encyclopedia-Database-Context
    # 备份输出路径 (支持$(date)占位符)
    output: backups/chromadb_main_$(date).chroma
  
  # 新数据库备份
  - name: gvedc_trading
    type: chromadb
    # 数据库路径
    path: C:\Users\Administrator\Documents\trae_projects\635416546534\GVEDC-trading-stocks-refine\db
    # 备份输出路径
    output: backups/gvedc_trading_$(date).chroma